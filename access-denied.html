<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Denegado - Solvo Platform</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card" style="text-align: center;">
      <div class="access-denied-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h2 class="access-denied-title">Acceso Denegado</h2>
      <p class="access-denied-text" id="denied-message">No tienes acceso a este registro.</p>
      <button class="btn btn-primary" id="denied-action" onclick="history.back()">Volver</button>
    </div>
  </div>
  <script>
    // Two variants based on query param:
    // ?type=section → "No tienes acceso a esta sección." + "Ir al Dashboard"
    // ?type=record (default) → "No tienes acceso a este registro." + "Volver"
    const params = new URLSearchParams(window.location.search);
    const type = params.get('type');

    if (type === 'section') {
      document.getElementById('denied-message').textContent = 'No tienes acceso a esta sección.';
      const btn = document.getElementById('denied-action');
      btn.textContent = 'Ir al Dashboard';
      btn.onclick = function() { window.location.href = 'dashboard.html'; };
    }
  </script>
</body>
</html>
